<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" rx="22" fill="#1E3A8A"/>
  <!-- Neural ring -->
  <circle cx="50" cy="50" r="30" stroke="#D4AF37" stroke-width="3" stroke-dasharray="8 4" opacity="0.6"/>
  <!-- Brain circuit dots -->
  <circle cx="50" cy="20" r="5" fill="#D4AF37"/>
  <circle cx="80" cy="50" r="5" fill="#D4AF37"/>
  <circle cx="50" cy="80" r="5" fill="#D4AF37"/>
  <circle cx="20" cy="50" r="5" fill="#D4AF37"/>
  <!-- Center core -->
  <circle cx="50" cy="50" r="12" fill="#D4AF37" opacity="0.9"/>
  <circle cx="50" cy="50" r="6" fill="#1E3A8A"/>
  <!-- Connectors -->
  <line x1="50" y1="25" x2="50" y2="38" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
  <line x1="75" y1="50" x2="62" y2="50" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="75" x2="50" y2="62" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
  <line x1="25" y1="50" x2="38" y2="50" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
</svg>
